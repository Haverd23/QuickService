services:
  broker:
    image: confluentinc/cp-kafka:7.6.1
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"

      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server broker:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - app-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "broker:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
    networks:
      - app-network

  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: database
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_SA_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      app-network:
        aliases:
          - sql

  qus-auth-api:
    build:
      context: ./api/QuickService
      dockerfile: src/Auth/QUS.Auth.API/Dockerfile
    container_name: qus-auth-api
    depends_on:
      database:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DEFAULT_CONNECTION: ${DEFAULT_CONNECTION}
      AppSettings__SecretKey: ${APPSETTINGS__SECRETKEY}
      Kafka__BootstrapServers: ${KAFKA__BOOTSTRAPSERVERS}
    ports:
      - "5000:8080"
    networks:
      - app-network

  qus-notification-api:
    build:
      context: ./api/QuickService
      dockerfile: src/Notification/QUS.Notification.API/Dockerfile
    container_name: qus-notification-api
    depends_on:
      database:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DEFAULT_CONNECTION: ${DEFAULT_CONNECTION}
      AppSettings__SecretKey: ${APPSETTINGS__SECRETKEY}
      Kafka__BootstrapServers: ${KAFKA__BOOTSTRAPSERVERS}
    ports:
      - "5001:8080"
    networks:
      - app-network

  qus-service-api:
    build:
      context: ./api/QuickService
      dockerfile: src/Service/QUS.Service.API/QUS.Service.API/Dockerfile
    container_name: qus-service-api
    depends_on:
      database:
        condition: service_healthy
      broker:
        condition: service_healthy
      qus-users-api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DEFAULT_CONNECTION: ${DEFAULT_CONNECTION}
      AppSettings__SecretKey: ${APPSETTINGS__SECRETKEY}
      Kafka__BootstrapServers: ${KAFKA__BOOTSTRAPSERVERS}
    ports:
      - "5002:8080"
    networks:
      - app-network

  qus-users-api:
    build:
      context: ./api/QuickService
      dockerfile: src/User/QUS.Users.API/Dockerfile
    container_name: qus-users-api
    depends_on:
      database:
        condition: service_healthy
      broker:
        condition: service_healthy
      qus-auth-api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DEFAULT_CONNECTION: ${DEFAULT_CONNECTION}
      AppSettings__SecretKey: ${APPSETTINGS__SECRETKEY}
      Kafka__BootstrapServers: ${KAFKA__BOOTSTRAPSERVERS}
    ports:
      - "5003:8080"
    networks:
      - app-network

  qus-workflows-api:
    build:
      context: ./api/QuickService
      dockerfile: src/Workflows/QUS.Workflows.API/Dockerfile
    container_name: qus-workflows-api
    depends_on:
      database:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DEFAULT_CONNECTION: ${DEFAULT_CONNECTION}
      AppSettings__SecretKey: ${APPSETTINGS__SECRETKEY}
      Kafka__BootstrapServers: ${KAFKA__BOOTSTRAPSERVERS}
    ports:
      - "5004:8080"
    networks:
      - app-network

  qus-web:
    build:
      context: ./web/QuickService
      dockerfile: Dockerfile
    container_name: qus-web
    depends_on:
      qus-auth-api:
        condition: service_started
      qus-service-api:
        condition: service_started
      qus-users-api:
        condition: service_started
      qus-workflows-api:
        condition: service_started
      qus-notification-api:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - app-network

volumes:
  mssql_data:

networks:
  app-network:
    driver: bridge